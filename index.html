<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Estimation patrimoniale — Bilan gratuit</title>
<meta name="description" content="Découvrez votre potentiel d'optimisation patrimoniale en 3 minutes. Estimation gratuite, sans engagement.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root{
  --cream:#faf6ef; --ink:#1f2a24; --green:#1f4d3d; --green-light:#2e6b53;
  --gold:#b8925a; --line:#e4dccb; --err:#b03a2e;
}
*{box-sizing:border-box}
body{margin:0;background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;line-height:1.5}
.wrap{max-width:640px;margin:0 auto;padding:24px 20px 60px}
h1,h2{font-family:'Playfair Display',serif;color:var(--green);margin:0 0 6px}
.eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:8px}
.subtitle{color:#5b6a62;font-size:15px;margin-bottom:28px}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:26px;margin-bottom:16px}
.progress{height:4px;background:var(--line);border-radius:2px;margin-bottom:24px;overflow:hidden}
.progress-bar{height:100%;background:var(--green);border-radius:2px;transition:width .3s}
label.field-label{display:block;font-weight:700;margin-bottom:6px;font-size:15px}
.field-sub{color:#7a887f;font-size:13px;margin-bottom:10px}
input[type=number],input[type=text],input[type=email],input[type=tel]{
  width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:9px;
  font-size:16px;font-family:inherit;background:#fdfcf9;color:var(--ink);margin-bottom:10px
}
input:focus{outline:2px solid var(--green-light);outline-offset:1px}
.opts{display:flex;flex-wrap:wrap;gap:8px}
.opt{border:1px solid var(--line);border-radius:9px;padding:10px 16px;cursor:pointer;font-size:14px;background:#fdfcf9;user-select:none}
.opt.sel{background:var(--green);color:#fff;border-color:var(--green)}
.opt.multi.sel{background:var(--gold);border-color:var(--gold)}
.nav{display:flex;justify-content:space-between;gap:12px;margin-top:22px}
button{font-family:inherit;font-size:15px;font-weight:700;border-radius:9px;padding:13px 22px;border:none;cursor:pointer}
.btn-primary{background:var(--green);color:#fff;flex:1}
.btn-primary:disabled{background:#a9b7ae;cursor:not-allowed}
.btn-secondary{background:transparent;color:var(--green);border:1px solid var(--line)}
.hd{display:none!important}
.result-hero{background:var(--green);color:#fff;border-radius:16px;padding:32px 26px;text-align:center;margin-bottom:20px}
.result-hero .amount{font-family:'Playfair Display',serif;font-size:42px;font-weight:700;margin:10px 0}
.result-hero .years{color:#d9e6de;font-size:15px}
.result-msg{font-size:15px;color:#3d473f;margin-bottom:22px}
.mention{font-size:12px;color:#8a968d;border-top:1px solid var(--line);padding-top:14px;margin-top:18px}
.err{color:var(--err);font-size:13px;margin-top:8px}
.cta-row{display:flex;gap:10px;margin-top:6px}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
// ════════════════════════════════════════════════════════════════════════
// MOTEUR DE CALCUL PATRIMONIAL — portage JS fidèle de server.py (moteur_simulateur.py)
// Barèmes 2026 (IR, IFI, droits de succession) — France
// ════════════════════════════════════════════════════════════════════════

const PRODUIT_LABELS = {
  per: "PER (Plan Épargne Retraite)", pea: "PEA", assurance_vie: "Assurance-vie",
  scpi: "SCPI", pea_pme: "PEA-PME", cto: "Compte-titres ordinaire",
  livret_a: "Livret A / LDDS", cap: "Contrat de capitalisation", sofica: "SOFICA",
  fip_fcpi: "FIP / FCPI", denormandie: "Denormandie", malraux: "Malraux",
  monuments_historiques: "Monuments Historiques", deficit_foncier: "Déficit foncier",
  lmnp_neuf: "LMNP Neuf", lmnp_ancien: "LMNP Ancien", lmnp_para_hotelier: "LMNP Para-Hôtelier",
  immo_rendement_neuf: "Immobilier de rendement (Neuf)", immo_rendement_ancien: "Immobilier de rendement (Ancien)",
  scpi_nue_propriete: "SCPI en nue-propriété", cap_demembre: "Contrat de capitalisation démembré",
  av_luxembourg: "Assurance-vie luxembourgeoise",
};

const PASS_2026 = 48060;
const PLAFOND_QF_PAR_DEMI_PART = 1807;

// (seuil_bas, taux, decote_par_part)
const BAREME_IR_2026 = [
  [0, 0.00, 0.0],
  [11600, 0.11, 1276.0],
  [29580, 0.30, 6896.01],
  [84578, 0.41, 16199.48],
  [181918, 0.45, 23476.16],
];

// (seuil_bas, taux, abattement_fixe)
const BAREME_IFI_2026 = [
  [800000, 0.000, 0.0],
  [1300001, 0.005, 4000.0],
  [2570001, 0.007, 6600.0],
  [5000001, 0.010, 14310.0],
  [10000001, 0.0125, 26810.0],
  [15000000000, 0.015, 51810.0],
];
const SEUIL_IMPOSITION_IFI = 1300000;

// (seuil_bas, taux, décote) — art. 777 CGI, ligne directe
const BAREME_DROITS_SUCCESSION_LIGNE_DIRECTE = [
  [0, 0.05, 0.0],
  [8072, 0.10, 404.0],
  [12109, 0.15, 1009.0],
  [15932, 0.20, 1806.0],
  [552324, 0.30, 57038.0],
  [902838, 0.40, 147322.0],
  [1805677, 0.45, 237606.0],
];

const ABATTEMENT_DONATION_LIGNE_DIRECTE = 100000;
const ABATTEMENT_AV_DECES_PAR_BENEFICIAIRE = 152500;

const PLAFOND_PER_PCT_REVENU = 0.10;
const PLAFOND_PER_MIN = Math.round(PASS_2026 * 0.10);
const MULTIPLE_PER_BESOIN_FISCAL = 2.5;

const TAUX_CREDIT_ANNUEL = 0.040;
const DUREE_CREDIT_ANNEES = 25;
const TAUX_ENDETTEMENT_MAX = 0.35;
const PONDERATION_REVENUS_LOCATIFS = 0.70;
const RENDEMENT_LOCATIF_ESTIME = 0.04;
const RATIO_TRAVAUX_DEFISCALISABLE = 0.80;
const SEUIL_MARCHE_MALRAUX_MH = 130000;
const TAUX_FRAIS_NOTAIRE_ANCIEN = 0.08;
const TAUX_FRAIS_NOTAIRE_NEUF = 0.04;
const DISPOSITIFS_NEUFS = new Set(["lmnp_neuf", "immo_rendement_neuf"]);

const TAUX_MALRAUX = 0.30;
const DUREE_MALRAUX_AVEC_PROROGATION = 6;
const MULTIPLE_ENVELOPPE_TRAVAUX_MALRAUX_MH = 20;

const SEUIL_RATIO_IMMO_TRANSMISSION = 0.70;
const SEUIL_PATRIMOINE_IMMO_DEMEMBREMENT = 150000;
const AGE_MAX_DEMEMBREMENT_INTERESSANT = 70;
const SEUIL_LIQUIDITES_CAPI_DEMEMBRE = 152500;

const SEUIL_AV_LUXEMBOURG = 100000;
const SEUIL_AV_LUXEMBOURG_PREMIUM = 1000000;

function round(x) { return Math.round(x); }
function getEnfantsTotal(a) {
  return parseInt((a.enfants_total !== undefined && a.enfants_total !== null) ? a.enfants_total : (a.enfants || 0));
}

// ── Fiscalité : IR / TMI / parts fiscales ──────────────────────────────────

function computePartsFiscales(situationFamiliale, enfants) {
  const base = (situationFamiliale === "marie" || situationFamiliale === "pacse") ? 2.0 : 1.0;
  if (enfants <= 0) return base;
  if (enfants <= 2) return base + 0.5 * enfants;
  return base + 0.5 * 2 + 1.0 * (enfants - 2);
}

function irBrutParTranche(revenuImposable, parts) {
  if (parts <= 0) parts = 1.0;
  if (revenuImposable <= 0) return { ir: 0.0, tmi: 0 };
  const revenuParPart = revenuImposable / parts;
  let tmi = 0, decote = 0.0;
  for (const [seuilBas, taux, dec] of BAREME_IR_2026) {
    if (revenuParPart >= seuilBas) { tmi = Math.round(taux * 100); decote = dec; }
    else break;
  }
  const irBrut = revenuImposable * (tmi / 100.0) - (decote * parts);
  return { ir: Math.max(0.0, irBrut), tmi };
}

function computeIrTmi(revenuImposable, parts, partsBase = 2.0) {
  if (revenuImposable <= 0) return { ir: 0, tmi: 0, revenu_par_part: 0 };
  if (parts <= partsBase) {
    const res = irBrutParTranche(revenuImposable, parts);
    return { ir: round(res.ir), tmi: res.tmi, revenu_par_part: round(revenuImposable / parts) };
  }
  const resSansQf = irBrutParTranche(revenuImposable, partsBase);
  const resAvecQf = irBrutParTranche(revenuImposable, parts);
  const avantageReel = resSansQf.ir - resAvecQf.ir;
  const nbDemiPartsSupp = (parts - partsBase) * 2;
  const plafondAvantage = nbDemiPartsSupp * PLAFOND_QF_PAR_DEMI_PART;
  let avantageRetenu = Math.min(avantageReel, plafondAvantage);
  avantageRetenu = Math.max(0.0, avantageRetenu);
  const irFinal = Math.max(0.0, resSansQf.ir - avantageRetenu);
  return { ir: round(irFinal), tmi: resAvecQf.tmi, revenu_par_part: round(revenuImposable / parts) };
}

function computeIfi(patrimoineImmoNet) {
  const p = patrimoineImmoNet;
  if (p < SEUIL_IMPOSITION_IFI) return { redevable: false, montant_ifi: 0, patrimoine_taxable: round(p) };
  let montant = 0.0;
  for (const [seuilBas, taux, abattement] of [...BAREME_IFI_2026].reverse()) {
    if (p >= seuilBas) { montant = p * taux - abattement; break; }
  }
  montant = Math.max(0.0, montant);
  if (p >= 1300000 && p < 1400000) {
    const decote = 17500 - 0.0125 * p;
    montant = Math.max(0.0, montant - decote);
  }
  return { redevable: true, montant_ifi: round(montant), patrimoine_taxable: round(p) };
}

function resolveFiscalite(aIn) {
  const a = Object.assign({}, aIn);
  const rev = parseFloat(a.revenu_annuel || 0);
  const situation = a.situation_familiale || "celibataire";
  const enfants = parseInt(a.enfants || 0);
  const parts = computePartsFiscales(situation, enfants);
  const partsBase = (situation === "marie" || situation === "pacse") ? 2.0 : 1.0;
  const calc = computeIrTmi(rev, parts, partsBase);

  const tmiFourni = a.tmi;
  const irFourni = a.montant_ir;
  a.tmi = (tmiFourni !== undefined && tmiFourni !== null) ? parseInt(tmiFourni) : calc.tmi;
  a.montant_ir = (irFourni !== undefined && irFourni !== null) ? parseFloat(irFourni) : calc.ir;
  a.fiscalite_calculee = {
    parts_fiscales: parts, revenu_par_part: calc.revenu_par_part,
    tmi_calcule: calc.tmi, ir_calcule: calc.ir,
    tmi_auto: (tmiFourni === undefined || tmiFourni === null),
    ir_auto: (irFourni === undefined || irFourni === null),
  };
  return a;
}

// ── Capacité d'emprunt ──────────────────────────────────────────────────────

function tauxFraisNotaire(dispositifId) {
  return DISPOSITIFS_NEUFS.has(dispositifId) ? TAUX_FRAIS_NOTAIRE_NEUF : TAUX_FRAIS_NOTAIRE_ANCIEN;
}

function annuiteMensuelle(montant, tauxAnnuel = TAUX_CREDIT_ANNUEL, dureeAnnees = DUREE_CREDIT_ANNEES) {
  const i = tauxAnnuel / 12.0;
  const n = dureeAnnees * 12;
  if (i <= 0) return n > 0 ? montant / n : 0.0;
  return montant * i / (1 - Math.pow(1 + i, -n));
}

function computeCapaciteEmprunt(a) {
  const revAnnuel = parseFloat(a.revenu_annuel || 0);
  const bfAnnuel = parseFloat(a.benefices_fonciers || 0);
  const mensualitesCredits = parseFloat(a.mensualites_credits || 0);
  const resPrinc = a.residence_principale || "non";
  const budgetRp = parseFloat(a.budget_residence_principale || 0);

  const revenuMensuel = revAnnuel / 12.0;
  const revenusLocatifsMensuels = bfAnnuel / 12.0;
  const revenusLocatifsPonderes = revenusLocatifsMensuels * PONDERATION_REVENUS_LOCATIFS;
  const revenuMensuelTotal = revenuMensuel + revenusLocatifsPonderes;

  const mensualiteMax = revenuMensuelTotal * TAUX_ENDETTEMENT_MAX;
  const mensualiteDisponible = Math.max(0.0, mensualiteMax - mensualitesCredits);

  const i = TAUX_CREDIT_ANNUEL / 12.0;
  const n = DUREE_CREDIT_ANNEES * 12;
  let capaciteMontant = (mensualiteDisponible > 0 && i > 0)
    ? mensualiteDisponible * (1 - Math.pow(1 + i, -n)) / i : 0.0;

  let mensualiteRp = 0.0;
  let capaciteDisponibleInvestissement = capaciteMontant;
  if (resPrinc === "non" && budgetRp > 0) {
    mensualiteRp = annuiteMensuelle(budgetRp);
    const mensualiteDispoInvestissement = Math.max(0.0, mensualiteDisponible - mensualiteRp);
    capaciteDisponibleInvestissement = (mensualiteDispoInvestissement > 0 && i > 0)
      ? mensualiteDispoInvestissement * (1 - Math.pow(1 + i, -n)) / i : 0.0;
  }

  return {
    revenu_mensuel: round(revenuMensuel),
    revenus_locatifs_ponderes: round(revenusLocatifsPonderes),
    revenu_mensuel_total: round(revenuMensuelTotal),
    mensualite_max_35: round(mensualiteMax),
    mensualites_credits: round(mensualitesCredits),
    mensualite_disponible: round(mensualiteDisponible),
    taux_indicatif: TAUX_CREDIT_ANNUEL,
    duree_annees: DUREE_CREDIT_ANNEES,
    capacite_montant: round(capaciteMontant),
    budget_residence_principale: round(budgetRp),
    mensualite_residence_principale: round(mensualiteRp),
    capacite_disponible_investissement: round(capaciteDisponibleInvestissement),
    peut_emprunter: capaciteDisponibleInvestissement >= 10000,
  };
}

function computeProjetImmo(a, capaciteInfo, dispositifId = "lmnp_ancien") {
  const capEpargne = parseFloat(a.capacite_epargne || 0);
  const capaciteMax = parseFloat(capaciteInfo.capacite_disponible_investissement || 0);
  const tauxFrais = tauxFraisNotaire(dispositifId);

  if (capaciteMax <= 0) {
    return { montant_projet: 0, montant_emprunte: 0, frais_notaire: 0, taux_frais_notaire: tauxFrais,
      mensualite_credit: 0, loyer_estime_mensuel: 0, effort_net_mensuel: 0,
      montant_eligible_travaux_80pct: 0, ajuste: false };
  }

  const montantProjetMax = capaciteMax / (1 + tauxFrais);
  const effortNet = (m) => {
    const montantEmprunte = m * (1 + tauxFrais);
    const mensualite = annuiteMensuelle(montantEmprunte);
    const loyerMensuel = m * RENDEMENT_LOCATIF_ESTIME / 12.0;
    return mensualite - loyerMensuel;
  };
  const effortAuMax = effortNet(montantProjetMax);

  let montantFinal, ajuste;
  if (effortAuMax <= capEpargne || capEpargne <= 0) {
    montantFinal = montantProjetMax; ajuste = false;
  } else {
    let lo = 0.0, hi = montantProjetMax;
    for (let k = 0; k < 60; k++) {
      const mid = (lo + hi) / 2;
      if (effortNet(mid) > capEpargne) hi = mid; else lo = mid;
    }
    montantFinal = lo; ajuste = true;
  }

  const montantEmprunteFinal = montantFinal * (1 + tauxFrais);
  const mensualiteFinale = annuiteMensuelle(montantEmprunteFinal);
  const loyerFinal = montantFinal * RENDEMENT_LOCATIF_ESTIME / 12.0;
  const effortFinal = mensualiteFinale - loyerFinal;

  return {
    montant_projet: round(montantFinal), montant_emprunte: round(montantEmprunteFinal),
    frais_notaire: round(montantFinal * tauxFrais), taux_frais_notaire: tauxFrais,
    mensualite_credit: round(mensualiteFinale), loyer_estime_mensuel: round(loyerFinal),
    effort_net_mensuel: round(effortFinal),
    montant_eligible_travaux_80pct: round(montantFinal * RATIO_TRAVAUX_DEFISCALISABLE),
    ajuste,
  };
}

// Durée d'étalement fiscal (nb d'années où l'avantage se répète) et durée
// d'engagement technique par dispositif — reprend exactement les valeurs
// du moteur d'origine (server.py, DUREE_DISPOSITIF), utilisées uniquement
// pour lisser la "Participation" nette d'impôt.
const DUREE_DISPOSITIF_FISCAL = {
  malraux: { etalement: DUREE_MALRAUX_AVEC_PROROGATION, engagement: 9 },
  monuments_historiques: { etalement: 4, engagement: 15 },
  denormandie: { etalement: 9, engagement: 9 },
  deficit_foncier: { etalement: 10, engagement: 3 },
};

function _participationMensuelle(mensualite, loyerMensuel, economieFiscaleAnnuelleRaw, dispositifId) {
  const tech = DUREE_DISPOSITIF_FISCAL[dispositifId];
  let ecoFiscaleLisseeAnnuelle = 0;
  if (tech && tech.etalement > 0 && tech.engagement > 0) {
    ecoFiscaleLisseeAnnuelle = (economieFiscaleAnnuelleRaw * tech.etalement) / tech.engagement;
  }
  return mensualite - loyerMensuel - (ecoFiscaleLisseeAnnuelle / 12.0);
}

function computeProjetMalrauxMh(a, capaciteInfo, dispositifId = "malraux") {
  const ir = parseFloat(a.montant_ir || 0);
  const tmi = parseInt(a.tmi || 0);
  const capaciteMax = parseFloat(capaciteInfo.capacite_disponible_investissement || 0);
  const capEpargne = parseFloat(a.capacite_epargne || 0);
  const tauxFrais = tauxFraisNotaire("malraux");

  const enveloppeTravaux = ir * MULTIPLE_ENVELOPPE_TRAVAUX_MALRAUX_MH;
  const montantPiloteParIr = enveloppeTravaux / RATIO_TRAVAUX_DEFISCALISABLE;
  const montantMaxAvantFrais = capaciteMax > 0 ? capaciteMax / (1 + tauxFrais) : 0.0;
  let montantFinal = capaciteMax > 0 ? Math.min(montantPiloteParIr, montantMaxAvantFrais) : 0.0;

  if (montantFinal <= 0) {
    return { montant_projet: 0, montant_emprunte: 0, frais_notaire: 0, taux_frais_notaire: tauxFrais,
      mensualite_credit: 0, loyer_estime_mensuel: 0, effort_net_mensuel: 0, participation_mensuelle: 0,
      montant_eligible_travaux_80pct: 0, enveloppe_travaux: round(enveloppeTravaux),
      ir_annuel: round(ir), plafonne_par_capacite_emprunt: false, ajuste_participation: false };
  }

  // Économie fiscale annuelle (brute) pour un montant donné — proportionnelle
  // au montant investi jusqu'au plafonnement à l'IR.
  function economieFiscaleAnnuelle(m) {
    const assietteAnnuelle = (m * RATIO_TRAVAUX_DEFISCALISABLE) / DUREE_MALRAUX_AVEC_PROROGATION;
    const taux = dispositifId === "monuments_historiques" ? (tmi / 100) : TAUX_MALRAUX;
    return Math.min(assietteAnnuelle * taux, ir);
  }
  function participationPour(m) {
    const montantEmprunte = m * (1 + tauxFrais);
    const mensualite = annuiteMensuelle(montantEmprunte);
    const loyer = m * RENDEMENT_LOCATIF_ESTIME / 12.0;
    const eco = economieFiscaleAnnuelle(m);
    return _participationMensuelle(mensualite, loyer, eco, dispositifId);
  }

  // Si même au montant maximal (capacité d'emprunt/IR) la Participation ne
  // dépasse pas la capacité d'épargne, pas besoin d'ajuster.
  let ajustePourParticipation = false;
  if (participationPour(montantFinal) > capEpargne && capEpargne >= 0) {
    ajustePourParticipation = true;
    let lo = 0.0, hi = montantFinal;
    for (let k = 0; k < 60; k++) {
      const mid = (lo + hi) / 2;
      if (participationPour(mid) > capEpargne) hi = mid; else lo = mid;
    }
    montantFinal = lo;
  }

  if (montantFinal <= 0) {
    return { montant_projet: 0, montant_emprunte: 0, frais_notaire: 0, taux_frais_notaire: tauxFrais,
      mensualite_credit: 0, loyer_estime_mensuel: 0, effort_net_mensuel: 0, participation_mensuelle: 0,
      montant_eligible_travaux_80pct: 0, enveloppe_travaux: round(enveloppeTravaux),
      ir_annuel: round(ir), plafonne_par_capacite_emprunt: false, ajuste_participation: ajustePourParticipation };
  }

  const montantEmprunteFinal = montantFinal * (1 + tauxFrais);
  const mensualiteFinale = annuiteMensuelle(montantEmprunteFinal);
  const loyerFinal = montantFinal * RENDEMENT_LOCATIF_ESTIME / 12.0;
  const ecoFiscaleFinale = economieFiscaleAnnuelle(montantFinal);
  const participationFinale = _participationMensuelle(mensualiteFinale, loyerFinal, ecoFiscaleFinale, dispositifId);

  return {
    montant_projet: round(montantFinal), montant_emprunte: round(montantEmprunteFinal),
    frais_notaire: round(montantFinal * tauxFrais), taux_frais_notaire: tauxFrais,
    mensualite_credit: round(mensualiteFinale), loyer_estime_mensuel: round(loyerFinal),
    effort_net_mensuel: round(mensualiteFinale - loyerFinal),
    participation_mensuelle: round(Math.max(0, participationFinale)),
    economie_fiscale_annuelle: round(ecoFiscaleFinale),
    montant_eligible_travaux_80pct: round(montantFinal * RATIO_TRAVAUX_DEFISCALISABLE),
    enveloppe_travaux: round(enveloppeTravaux), ir_annuel: round(ir),
    plafonne_par_capacite_emprunt: montantPiloteParIr > montantMaxAvantFrais,
    ajuste_participation: ajustePourParticipation,
  };
}

function canBorrow(capaciteMontant) { return capaciteMontant >= 10000; }

// ── Arbre de décision immobilier ────────────────────────────────────────────

function immoRecommendations(a) {
  const tmi = parseInt(a.tmi || 0);
  const ir = parseFloat(a.montant_ir || 0);
  const bf = parseFloat(a.benefices_fonciers || 0);
  const horizon = a.horizon || "moyen";
  const capEpargne = parseFloat(a.capacite_epargne || 0);
  const age = parseInt(a.age || 40);
  let objectifs = a.objectifs_prioritaires || [];
  if (typeof objectifs === "string") objectifs = [objectifs];
  const hasTransmission = objectifs.includes("transmission") || objectifs.includes("revenus_compl");

  const capacite = computeCapaciteEmprunt(a);
  const capEmpruntMontant = capacite.capacite_disponible_investissement;

  if (!canBorrow(capEmpruntMontant)) return [];

  const resPrinc = a.residence_principale || "non";
  if (resPrinc === "non") return [];

  const prioriteImmoLevier = (capEmpruntMontant >= 140000 && age < 53 && capEpargne > 500);
  const marcheMalrauxMhDisponible = capEmpruntMontant >= SEUIL_MARCHE_MALRAUX_MH;
  const projetsMalrauxMhCache = {};
  const projetsCache = {};

  function reco(prodId, stars, why) {
    let proj;
    if (prodId === "malraux" || prodId === "monuments_historiques") {
      if (!(prodId in projetsMalrauxMhCache)) projetsMalrauxMhCache[prodId] = computeProjetMalrauxMh(a, capacite, prodId);
      proj = projetsMalrauxMhCache[prodId];
    } else {
      if (!(prodId in projetsCache)) projetsCache[prodId] = computeProjetImmo(a, capacite, prodId);
      proj = projetsCache[prodId];
    }
    return [{ id: prodId, label: PRODUIT_LABELS[prodId] || prodId, stars, rationale: why,
      levier: prioriteImmoLevier, projet: proj }];
  }

  if (ir < 2500) {
    if (hasTransmission || horizon === "tres_long") {
      return reco("lmnp_ancien", 5, "Peu ou pas d'IR, objectif revenus/transmission : LMNP Ancien.");
    }
    return reco("immo_rendement_ancien", 4, "Peu ou pas d'IR : immobilier de rendement.");
  }

  if (bf > 6000 && tmi >= 30) {
    return reco("deficit_foncier", 5, `Bénéfices fonciers ${Math.round(bf)} €/an > 6 000 € et TMI ${tmi} % : Déficit foncier.`);
  }

  if (ir > 20000 && tmi >= 41 && marcheMalrauxMhDisponible) {
    return reco("monuments_historiques", 5, `IR ${Math.round(ir)} € et TMI ${tmi} % : Monuments Historiques.`);
  }

  if (ir > 9000 && marcheMalrauxMhDisponible) {
    return reco("malraux", 5, `IR ${Math.round(ir)} € : Malraux.`);
  }

  if (ir > 9000 && !marcheMalrauxMhDisponible) {
    if (tmi >= 30) return reco("lmnp_para_hotelier", 4, `IR ${Math.round(ir)} € mais capacité < 130 000 € : LMNP Para-Hôtelier.`);
    return reco("lmnp_ancien", 4, `IR ${Math.round(ir)} € mais capacité < 130 000 € : LMNP Ancien.`);
  }

  if (ir >= 2500 && ir <= 9000) {
    return reco("denormandie", 4, `IR ${Math.round(ir)} € : Denormandie.`);
  }

  if (horizon === "tres_long" && tmi >= 30) {
    return reco("lmnp_para_hotelier", 4, `Horizon > 20 ans et TMI ${tmi} % : LMNP Para-Hôtelier.`);
  }

  if ((horizon === "long" || horizon === "tres_long") && tmi >= 30) {
    return reco("lmnp_ancien", 4, `Horizon ≥ 15 ans et TMI ${tmi} % : LMNP Ancien.`);
  }

  return [];
}

// ── Économie fiscale annuelle (avec correctif de cohérence) ────────────────

const _DUREE_DISPOSITIF_ENGAGEMENT_MIN = {
  malraux: 4, monuments_historiques: 4, denormandie: 6, deficit_foncier: 3,
};

function computeTaxSavings(a) {
  const tmi = parseInt(a.tmi || 0);
  const rev = parseFloat(a.revenu_annuel || 0);
  const capEpargne = parseFloat(a.capacite_epargne || 0);
  const ir = parseFloat(a.montant_ir || 0);
  const bf = parseFloat(a.benefices_fonciers || 0);

  const capaciteInfo = computeCapaciteEmprunt(a);
  const capDisponible = capaciteInfo.capacite_disponible_investissement;
  const peutEmprunter = canBorrow(capDisponible);
  const marcheMalrauxMhDisponible = capDisponible >= SEUIL_MARCHE_MALRAUX_MH;

  const projet = peutEmprunter ? computeProjetImmo(a, capaciteInfo) : null;
  const montantTravaux80 = projet ? projet.montant_eligible_travaux_80pct : 0;

  const projetMalraux = peutEmprunter ? computeProjetMalrauxMh(a, capaciteInfo, "malraux") : null;
  const projetMh = peutEmprunter ? computeProjetMalrauxMh(a, capaciteInfo, "monuments_historiques") : null;

  const sources = [];
  let total = 0.0;

  // 1) PER : uniquement si TMI ≥ 30 % et capacité d'épargne ≥ 100 €/mois
  if (tmi >= 30 && capEpargne >= 100) {
    const versementPer = Math.min(rev * 0.10, Math.max(capEpargne * 12, 2000), 35000);
    const ecoPer = versementPer * (tmi / 100.0);
    if (ecoPer > 0) {
      sources.push({ label: "Versement PER", amount: round(ecoPer) });
      total += ecoPer;
    }
  }

  // 2) Dispositifs immobiliers — si imposable et capacité d'emprunt
  if (peutEmprunter) {
    if (ir >= 2500 && ir < 9000) {
      const eco = Math.min(ir * 0.6, 4000);
      sources.push({ label: "Investissement Denormandie", amount: round(eco) });
      total += eco;
    } else if (ir >= 9000 && tmi >= 30 && marcheMalrauxMhDisponible) {
      const eco = projetMalraux ? projetMalraux.economie_fiscale_annuelle : 0;
      sources.push({ label: "Investissement Malraux", amount: round(eco) });
      total += eco;
    }
    if (ir >= 20000 && tmi >= 41 && marcheMalrauxMhDisponible) {
      const eco = projetMh ? projetMh.economie_fiscale_annuelle : 0;
      sources.push({ label: "Monuments Historiques", amount: round(eco) });
      total += eco;
    }
    if (bf > 6000 && tmi >= 30) {
      const plafondTravauxAnnuel = montantTravaux80 > 0 ? Math.min(10700, montantTravaux80) : 10700;
      const eco = (tmi + 17.2) / 100 * plafondTravauxAnnuel;
      sources.push({ label: "Déficit foncier", amount: round(eco) });
      total += eco;
    }
  }

  return { total_annual: round(total), sources };
}

// ── Plan d'affectation de l'épargne (surplus après précaution) ─────────────

function repartirSurplusTransmission(restant, a) {
  // Version simplifiée pour le simulateur public : le détail des lignes de
  // cascade (produits successifs) n'est pas affiché dans le teaser — seul
  // le montant total du surplus disponible est utilisé pour le contrat de
  // capitalisation démembré. On retourne une liste vide ici volontairement.
  return [];
}

function computePlanAffectationEpargne(a) {
  const rev = parseFloat(a.revenu_annuel || 0);
  const tmi = parseInt(a.tmi || 0);
  const ir = parseFloat(a.montant_ir || 0);
  const epargnePrec = parseFloat(a.epargne_precaution || 0);
  const risque = a.tolerance_risque || "equilibre";

  const seuilPrec = (rev / 12.0) * 3.0;
  const surplus = Math.max(0.0, epargnePrec - seuilPrec);

  if (surplus <= 0) {
    return { epargne_precaution_cible: round(seuilPrec), epargne_precaution_actuelle: round(epargnePrec),
      surplus_a_affecter: 0, besoin_fiscal: false, lignes: [], commentaire: "" };
  }

  let restant = surplus;
  const lignes = [];
  const besoinFiscal = tmi >= 30 && ir > 0;

  if (besoinFiscal) {
    const plafondPer = Math.max(rev * PLAFOND_PER_PCT_REVENU, PLAFOND_PER_MIN);
    const versementPerCible = Math.min(rev * MULTIPLE_PER_BESOIN_FISCAL, plafondPer, restant);
    if (versementPerCible > 0) {
      lignes.push({ produit: "per", label: PRODUIT_LABELS.per, montant: round(versementPerCible) });
      restant -= versementPerCible;
    }
    if (restant > 0 && versementPerCible >= plafondPer - 1 && risque === "offensif") {
      let versementSoficaCible = Math.min(restant, 18000 * 0.48 / 0.30);
      versementSoficaCible = Math.min(versementSoficaCible, restant * 0.5);
      if (versementSoficaCible > 500) {
        lignes.push({ produit: "sofica", label: PRODUIT_LABELS.sofica, montant: round(versementSoficaCible) });
        restant -= versementSoficaCible;
      }
    }
  }

  return {
    epargne_precaution_cible: round(seuilPrec), epargne_precaution_actuelle: round(epargnePrec),
    surplus_a_affecter: round(surplus), besoin_fiscal: besoinFiscal, lignes,
    restant_apres_lignes: round(restant),
  };
}

// ── Démembrement (bien détenu) ──────────────────────────────────────────────

function valeurNuePropretePct(age) {
  if (age < 21) return 0.10;
  if (age < 31) return 0.20;
  if (age < 41) return 0.30;
  if (age < 51) return 0.40;
  if (age < 61) return 0.50;
  if (age < 71) return 0.60;
  return 0.70;
}

function computeDemembrementReco(a) {
  const age = parseInt(a.age || 40);
  const patFin = parseFloat(a.patrimoine_financier || 0);
  const patImmo = parseFloat(a.patrimoine_immo || 0);
  let objectifs = a.objectifs_prioritaires || [];
  if (typeof objectifs === "string") objectifs = [objectifs];

  if (!objectifs.includes("transmission")) return null;
  if (age >= AGE_MAX_DEMEMBREMENT_INTERESSANT) return null;
  if (patImmo < SEUIL_PATRIMOINE_IMMO_DEMEMBREMENT) return null;

  const totalPatrimoine = patFin + patImmo;
  if (totalPatrimoine <= 0) return null;

  const ratioImmo = patImmo / totalPatrimoine;
  if (ratioImmo < SEUIL_RATIO_IMMO_TRANSMISSION) return null;

  const valeurNpPct = valeurNuePropretePct(age);
  const baseTaxableIndicative = patImmo * valeurNpPct;

  return {
    id: "demembrement", label: "Démembrement (donation de la nue-propriété)", stars: 5,
    valeur_bien_indicative: round(patImmo), valeur_nue_propriete_pct: valeurNpPct,
    base_taxable_indicative: round(baseTaxableIndicative), ratio_immo_patrimoine: Math.round(ratioImmo * 1000) / 10,
  };
}

// ── Contrat de capitalisation démembré ──────────────────────────────────────

function computeCapiDemembreReco(a, planEpargne) {
  const age = parseInt(a.age || 40);
  const enfants = getEnfantsTotal(a);
  let objectifs = a.objectifs_prioritaires || [];
  if (typeof objectifs === "string") objectifs = [objectifs];

  if (!objectifs.includes("transmission")) return null;
  if (enfants <= 0) return null;

  const surplus = parseFloat(planEpargne.surplus_a_affecter || 0);
  if (surplus <= SEUIL_LIQUIDITES_CAPI_DEMEMBRE) return null;

  const montantExcedent = surplus - SEUIL_LIQUIDITES_CAPI_DEMEMBRE;
  const valeurNpPct = valeurNuePropretePct(age);
  const baseTaxableNp = montantExcedent * valeurNpPct;

  const montantDejaDonne = parseFloat(a.montant_donations_effectuees || 0);
  const abattementDisponibleParEnfant = Math.max(0.0, ABATTEMENT_DONATION_LIGNE_DIRECTE - montantDejaDonne);
  const abattementTotalDisponible = abattementDisponibleParEnfant * enfants;
  const baseTaxableApresAbattement = Math.max(0.0, baseTaxableNp - abattementTotalDisponible);

  return {
    id: "cap_demembre", label: PRODUIT_LABELS.cap_demembre, stars: 4,
    montant_excedent: round(montantExcedent), valeur_nue_propriete_pct: valeurNpPct,
    base_taxable_avant_abattement: round(baseTaxableNp),
    abattement_disponible_par_enfant: round(abattementDisponibleParEnfant),
    abattement_total_disponible: round(abattementTotalDisponible),
    base_taxable_apres_abattement: round(baseTaxableApresAbattement),
  };
}

// ── Assurance-vie luxembourgeoise ───────────────────────────────────────────

function computeAvLuxembourgReco(a) {
  const patFin = parseFloat(a.patrimoine_financier || 0);
  const epargnePrec = parseFloat(a.epargne_precaution || 0);
  const patrimoineDisponible = Math.max(0.0, patFin - epargnePrec);

  if (patrimoineDisponible < SEUIL_AV_LUXEMBOURG) return null;
  const premium = patrimoineDisponible >= SEUIL_AV_LUXEMBOURG_PREMIUM;

  return {
    id: "av_luxembourg", label: PRODUIT_LABELS.av_luxembourg, stars: 3,
    patrimoine_disponible: round(patrimoineDisponible), seuil_pertinence: SEUIL_AV_LUXEMBOURG, premium,
  };
}

// ── Vente immobilier locatif → réinvestissement AV ──────────────────────────

function computeVenteImmoLocatifReco(a) {
  const detenus = a.produits_detenus || [];
  if (!detenus.includes("locatif")) return null;

  const montantLocatif = parseFloat(a.montant_locatif || 0);
  if (montantLocatif < 50000) return null;

  const age = parseInt(a.age || 40);
  if (age >= 70) return null;

  // Vente uniquement si le client est explicitement d'accord (question posée
  // dès qu'il possède plusieurs biens locatifs). S'il n'a qu'un seul bien et
  // que la question n'a pas été posée, on garde le comportement historique.
  if (a.pret_a_vendre_locatif !== undefined && a.pret_a_vendre_locatif !== "oui") return null;

  let objectifs = a.objectifs_prioritaires || [];
  if (typeof objectifs === "string") objectifs = [objectifs];
  if (!objectifs.includes("transmission")) return null;

  const enfants = getEnfantsTotal(a);
  const nbBeneficiaires = Math.max(1, enfants);
  const plafondAv = ABATTEMENT_AV_DECES_PAR_BENEFICIAIRE * nbBeneficiaires;
  const montantAvActuel = parseFloat(a.montant_av || 0);
  const plafondRestant = Math.max(0.0, plafondAv - montantAvActuel);

  // Capital réinvesti en assurance-vie jusqu'au plafond des 152 500 €/
  // bénéficiaire ; au-delà, l'excédent est orienté vers un contrat de
  // capitalisation démembré (donation de la nue-propriété aux enfants).
  const capitalAReinvestir = Math.min(montantLocatif, plafondRestant);
  const montantExcedentCapiDemembre = Math.max(0.0, montantLocatif - capitalAReinvestir);

  if (capitalAReinvestir < 10000 && montantExcedentCapiDemembre < 10000) return null;

  const droitsEconomisesAv = round(_calculeDroitsSuccession(capitalAReinvestir / nbBeneficiaires) * nbBeneficiaires);

  let droitsEconomisesDemembre = 0;
  let baseTaxableDemembreApresAbattement = 0;
  if (montantExcedentCapiDemembre > 0 && enfants > 0) {
    const valeurNpPct = valeurNuePropretePct(age);
    const baseTaxableNp = montantExcedentCapiDemembre * valeurNpPct;
    const abattementTotalDisponible = ABATTEMENT_DONATION_LIGNE_DIRECTE * enfants;
    baseTaxableDemembreApresAbattement = Math.max(0.0, baseTaxableNp - abattementTotalDisponible);
    const baseAvantDemembre = Math.max(0.0, montantExcedentCapiDemembre - abattementTotalDisponible);
    const droitsAvant = _calculeDroitsSuccession(baseAvantDemembre / nbBeneficiaires) * nbBeneficiaires;
    const droitsApres = _calculeDroitsSuccession(baseTaxableDemembreApresAbattement / nbBeneficiaires) * nbBeneficiaires;
    droitsEconomisesDemembre = round(Math.max(0.0, droitsAvant - droitsApres));
  }

  const droitsEconomises = droitsEconomisesAv + droitsEconomisesDemembre;
  const bf = parseFloat(a.benefices_fonciers || 0);
  const revenuAvEstime = capitalAReinvestir * 0.04;
  const rendementLocatifBrut = montantLocatif > 0 ? bf / montantLocatif : 0;

  return {
    id: "vente_immo_locatif_av", label: "Réorientation immobilier locatif → Assurance-vie", stars: 4,
    montant_locatif: round(montantLocatif), plafond_av_restant: round(plafondRestant),
    capital_a_reinvestir: round(capitalAReinvestir),
    montant_excedent_capi_demembre: round(montantExcedentCapiDemembre),
    droits_economises_av: droitsEconomisesAv, droits_economises_demembre: droitsEconomisesDemembre,
    droits_economises: droitsEconomises,
    revenu_av_estime: round(revenuAvEstime), rendement_locatif_brut_pct: Math.round(rendementLocatifBrut * 1000) / 10,
  };
}

const AGE_MAX_CCA_SCI = 75;
const DUREE_CCA_SCI_ANNEES = 20;
const SEUIL_PATRIMOINE_LOCATIF_CCA = 500000;

function computeCcaSciReco(a) {
  const detenus = a.produits_detenus || [];
  if (!detenus.includes("locatif")) return null;

  const nbBiens = parseInt(a.nb_biens_locatifs || 1);
  if (nbBiens < 2) return null; // logique réservée aux clients avec plusieurs biens

  // Cette piste ne s'applique que si le client ne souhaite PAS vendre.
  if (a.pret_a_vendre_locatif !== "non") return null;

  const age = parseInt(a.age || 40);
  if (age > AGE_MAX_CCA_SCI) return null;

  const montantLocatif = parseFloat(a.montant_locatif || 0);
  // Montage pertinent surtout pour un patrimoine locatif conséquent, et
  // motivé avant tout par un objectif de transmission (le bénéfice
  // principal est la sortie de l'assiette successorale taxée au barème).
  if (montantLocatif < SEUIL_PATRIMOINE_LOCATIF_CCA) return null;

  let objectifs = a.objectifs_prioritaires || [];
  if (typeof objectifs === "string") objectifs = [objectifs];
  if (!objectifs.includes("transmission")) return null;

  const loyerNetAnnuel = parseFloat(a.benefices_fonciers || 0);
  if (loyerNetAnnuel <= 0) return null;

  // Apport des biens en compte courant d'associé (SCI) : la société
  // rembourse le prospect avec les loyers nets des biens apportés, sur
  // DUREE_CCA_SCI_ANNEES ans — ce remboursement n'est pas fiscalisé
  // (remboursement de capital, pas un revenu).
  const remboursementCumule = Math.min(montantLocatif, loyerNetAnnuel * DUREE_CCA_SCI_ANNEES);
  const revenuMensuelNonFiscalise = remboursementCumule / (DUREE_CCA_SCI_ANNEES * 12);

  // Bénéfice succession : si ces remboursements (non fiscalisés) sont
  // progressivement replacés en assurance-vie, ils sortent de l'assiette
  // successorale taxée au barème pour profiter de l'abattement AV
  // (152 500 €/bénéficiaire). Le delta ne porte que sur la fraction
  // effectivement replaçable dans ce plafond.
  const enfants = getEnfantsTotal(a);
  const nbBeneficiaires = Math.max(1, enfants);
  const montantAvActuel = parseFloat(a.montant_av || 0);
  const plafondAvRestant = Math.max(0.0, ABATTEMENT_AV_DECES_PAR_BENEFICIAIRE * nbBeneficiaires - montantAvActuel);
  const montantRedirigeVersAv = Math.min(remboursementCumule, plafondAvRestant);
  const droitsEconomises = round(_calculeDroitsSuccession(montantRedirigeVersAv / nbBeneficiaires) * nbBeneficiaires);

  return {
    id: "cca_sci_locatif", label: "Apport des biens locatifs en compte courant d'associé (SCI)", stars: 4,
    montant_cca: round(montantLocatif), loyer_net_annuel: round(loyerNetAnnuel),
    duree_annees: DUREE_CCA_SCI_ANNEES, remboursement_cumule: round(remboursementCumule),
    revenu_mensuel_non_fiscalise: round(revenuMensuelNonFiscalise),
    montant_redirige_vers_av: round(montantRedirigeVersAv), droits_economises: droitsEconomises,
  };
}

// ── Droits de succession ────────────────────────────────────────────────────

function _calculeDroitsSuccession(baseTaxable) {
  if (baseTaxable <= 0) return 0.0;
  let droits = 0.0;
  for (const [seuil, taux, decote] of BAREME_DROITS_SUCCESSION_LIGNE_DIRECTE) {
    if (baseTaxable >= seuil) droits = baseTaxable * taux - decote;
    else break;
  }
  return Math.max(0.0, droits);
}

function droitsAvEconomises(patFin, montantAv, enfants, age) {
  const nbBeneficiaires = Math.max(1, enfants);
  let plafondAv = ABATTEMENT_AV_DECES_PAR_BENEFICIAIRE * nbBeneficiaires;
  if (age >= 70) plafondAv = 30500;

  const potentielRestant = Math.max(0.0, plafondAv - montantAv);
  if (potentielRestant <= 0) {
    return { plafond_av: round(plafondAv), av_actuelle: round(montantAv), potentiel_restant: 0,
      droits_economises: 0, base_optimisable: 0 };
  }

  const abattementTotalLd = ABATTEMENT_DONATION_LIGNE_DIRECTE * nbBeneficiaires;
  const baseTaxableActuelle = Math.max(0.0, patFin - abattementTotalLd);
  const baseTaxableOptimisee = Math.max(0.0, baseTaxableActuelle - potentielRestant);

  const droitsAvant = _calculeDroitsSuccession(baseTaxableActuelle / nbBeneficiaires) * nbBeneficiaires;
  const droitsApres = _calculeDroitsSuccession(baseTaxableOptimisee / nbBeneficiaires) * nbBeneficiaires;

  return {
    plafond_av: round(plafondAv), av_actuelle: round(montantAv), potentiel_restant: round(potentielRestant),
    droits_economises: round(Math.max(0.0, droitsAvant - droitsApres)), base_optimisable: round(potentielRestant),
  };
}

// ── compute_recommendations (orchestrateur principal) ───────────────────────

const PRIORITE_LABELS = {
  epargne_precaution: "Constituer une épargne de précaution", retraite: "Préparer la retraite",
  fiscalite: "Optimiser la fiscalité", immobilier: "Diversifier dans l'immobilier",
  transmission: "Anticiper la transmission", prevoyance: "Renforcer la prévoyance familiale",
  investissement_lt: "Faire fructifier le capital sur le long terme", dette: "Maîtriser l'endettement",
};
const PRIORITE_DESC = {
  epargne_precaution: "Sécuriser 3 à 6 mois de dépenses sur livrets liquides avant toute autre démarche.",
  retraite: "Compenser la baisse de revenus prévisible et capitaliser sur l'effet du temps.",
  fiscalite: "Activer les leviers de déduction et d'enveloppes défiscalisées adaptés à votre TMI.",
  immobilier: "Profiter de l'effet de levier et générer des revenus complémentaires.",
  transmission: "Préparer la donation et l'optimisation successorale en amont.",
  prevoyance: "Protéger votre famille des aléas (décès, invalidité, perte de revenus).",
  investissement_lt: "Construire un patrimoine financier diversifié et performant sur 10+ ans.",
  dette: "Réduire la charge d'intérêts pour libérer de la capacité d'épargne.",
};

function computeRecommendations(aIn) {
  const a = resolveFiscalite(aIn);

  const age = parseInt(a.age || 40);
  const tmi = parseInt(a.tmi || 0);
  const rev = parseFloat(a.revenu_annuel || 0);
  const capEpargne = parseFloat(a.capacite_epargne || 0);
  const epargnePrec = parseFloat(a.epargne_precaution || 0);
  const patFin = parseFloat(a.patrimoine_financier || 0);
  const patImmo = parseFloat(a.patrimoine_immo || 0);
  const resPrinc = a.residence_principale || "non";
  const mensualitesCredits = parseFloat(a.mensualites_credits || 0);
  const horizon = a.horizon || "moyen";
  const risque = a.tolerance_risque || "equilibre";
  const retraitePrep = a.retraite_preparee || "aucune";
  const prevoyance = a.prevoyance || "aucune";
  const donation = a.donation || "non";
  const ifiDeclare = (a.ifi !== undefined && a.ifi !== null) ? a.ifi : null;
  const detenus = a.produits_detenus || [];
  const enfants = parseInt(a.enfants || 0);
  let objectifs = a.objectifs_prioritaires || [];
  if (typeof objectifs === "string") objectifs = [objectifs];
  const ir = parseFloat(a.montant_ir || 0);

  const ifiInfo = computeIfi(patImmo);
  const ifi = ifiDeclare !== null ? ifiDeclare : (ifiInfo.redevable ? "oui" : "non");

  const capaciteInfo = computeCapaciteEmprunt(a);
  const capEmpruntMontant = capaciteInfo.capacite_disponible_investissement;
  const peutEmprunter = canBorrow(capEmpruntMontant);

  const prioriteImmoLevier = (capEmpruntMontant >= 140000 && age < 53 && capEpargne > 500 && peutEmprunter);

  const hasAv = detenus.includes("av");
  const hasPer = detenus.includes("per");
  const montantAvExistant = parseFloat(a.montant_av || 0);

  const seuilPrec = (rev / 12.0) * 3.0;
  const precautionOk = epargnePrec >= seuilPrec;
  const moyenTermeOk = hasAv && montantAvExistant > 0;
  const baseSecurisee = precautionOk && moyenTermeOk;

  const s = {};
  const setp = (k, v) => { s[k] = Math.max(s[k] || 0, v); };

  if (ir <= 3000 || tmi < 30) {
    setp("assurance_vie", 5);
  } else {
    setp("assurance_vie", 4);
  }
  if (objectifs.includes("transmission") || objectifs.includes("valoriser") || patFin > 50000 || age > 50) {
    setp("assurance_vie", 5);
  }

  if (tmi >= 30 && capEpargne >= 100) {
    setp("per", 5);
  }

  if (!peutEmprunter) {
    if (tmi < 30 && ir > 0) { setp("sofica", 3); setp("fip_fcpi", 3); }
  }

  if (risque === "offensif" && (horizon === "long" || horizon === "tres_long")) {
    setp("pea", 5);
  } else if (risque === "offensif") {
    setp("pea", 4);
  }

  setp("scpi", 2);
  if (patFin > 30000 && (horizon === "long" || horizon === "tres_long")) setp("scpi", 4);
  if (objectifs.includes("immobilier") || objectifs.includes("revenus_compl")) setp("scpi", 4);

  setp("livret_a", epargnePrec < seuilPrec ? 5 : 2);

  if (patFin > 150000 || detenus.includes("pea")) setp("cto", 4); else setp("cto", 2);

  if (patFin > 250000 || ifi === "oui" || ifi === "proche") setp("cap", 4);
  if (objectifs.includes("transmission") && patFin > 200000) setp("cap", 5);

  if (objectifs.includes("transmission") && tmi >= 30) setp("scpi_nue_propriete", 4);

  let immoRecos = immoRecommendations(a);
  // (enrichissement du rationale omis : non affiché dans le teaser public)

  if (immoRecos.length && !baseSecurisee) {
    immoRecos = immoRecos.map(r => ({ ...r, stars: Math.max(1, r.stars - 2), etape_suivante: true, levier: false }));
  }

  const baseRecos = Object.entries(s)
    .map(([k, v]) => ({ id: k, label: PRODUIT_LABELS[k] || k, stars: v }))
    .sort((x, y) => y.stars - x.stars);

  const byId = {};
  baseRecos.forEach(r => { byId[r.id] = r; });
  immoRecos.forEach(r => {
    if (byId[r.id]) {
      byId[r.id].stars = r.etape_suivante ? r.stars : Math.max(byId[r.id].stars, r.stars);
      byId[r.id].levier = r.levier || false;
      byId[r.id].etape_suivante = r.etape_suivante || false;
    } else {
      byId[r.id] = r;
    }
  });

  let recosFinal = Object.values(byId).sort((x, y) => y.stars - x.stars);

  if (prioriteImmoLevier && immoRecos.length && baseSecurisee) {
    const immoId = immoRecos[0].id;
    recosFinal = [
      ...recosFinal.filter(r => r.id === immoId),
      ...recosFinal.filter(r => r.id !== immoId),
    ];
  }

  // ── Priorités ──
  const pScores = {}; Object.keys(PRIORITE_LABELS).forEach(k => pScores[k] = 0.0);

  pScores.epargne_precaution = epargnePrec < seuilPrec ? (10 - (epargnePrec / Math.max(seuilPrec, 1)) * 8) : 1;

  let baseRet = { aucune: 9, faible: 7, moyenne: 4, bonne: 2 }[retraitePrep] ?? 5;
  if (age >= 45) baseRet += 1.5;
  if (objectifs.includes("retraite")) baseRet += 2;
  pScores.retraite = Math.min(10, baseRet);

  let fisc = { 0: 1, 11: 4, 30: 7, 41: 9, 45: 9 }[tmi] ?? 1;
  if (objectifs.includes("fiscalite")) fisc += 1.5;
  pScores.fiscalite = Math.min(10, fisc);

  let pIm = 3;
  if (patImmo === 0 && resPrinc === "non") pIm = 7;
  if (objectifs.includes("immobilier")) pIm = 9;
  if (tmi >= 30 && patImmo < 100000) pIm += 1;
  pScores.immobilier = Math.min(10, pIm);

  let pTr = 2;
  if ((patFin + patImmo) > 500000) pTr = 6;
  if ((patFin + patImmo) > 1300000 || ifi !== "non") pTr = 9;
  if ((donation === "non" || donation === "reflexion") && (patFin + patImmo) > 300000) pTr = Math.max(pTr, 6);
  if (objectifs.includes("transmission")) pTr = Math.max(pTr, 9);
  if (enfants >= 1 && (patFin + patImmo) > 200000) pTr += 1;
  pScores.transmission = Math.min(10, pTr);

  let pPv = { aucune: 8, employeur: 6, individuelle: 3, complet: 2 }[prevoyance] ?? 4;
  if (enfants >= 1 && (prevoyance === "aucune" || prevoyance === "employeur")) pPv = Math.min(10, pPv + 2);
  if (objectifs.includes("proteger")) pPv = Math.min(10, pPv + 1);
  pScores.prevoyance = pPv;

  let pLt = 4;
  if (capEpargne >= 500 && (horizon === "long" || horizon === "tres_long")) pLt = 7;
  if (patFin < 20000 && capEpargne >= 300) pLt += 1;
  if (objectifs.includes("valoriser") || objectifs.includes("revenus_compl")) pLt = Math.max(pLt, 7);
  pScores.investissement_lt = Math.min(10, pLt);

  const revenuMensuel = rev / 12.0;
  const tauxEndettement = revenuMensuel > 0 ? (mensualitesCredits / revenuMensuel) : 0;
  pScores.dette = tauxEndettement > 0.35 ? 8 : (tauxEndettement > 0.20 ? 5 : 1);

  const mappingObjPriorite = {
    retraite: "retraite", fiscalite: "fiscalite", immobilier: "immobilier", transmission: "transmission",
    proteger: "prevoyance", valoriser: "investissement_lt", revenus_compl: "investissement_lt",
  };
  objectifs.slice(0, 3).forEach((obj, i) => {
    const target = mappingObjPriorite[obj];
    if (target) {
      const boost = [2.5, 1.5, 0.8][i];
      pScores[target] = Math.min(10, pScores[target] + boost);
    }
  });

  const top = Object.entries(pScores).sort((x, y) => y[1] - x[1]).slice(0, 5);
  const priorites = top.map(([k, v], i) => ({
    id: k, label: PRIORITE_LABELS[k], description: PRIORITE_DESC[k], intensity: Math.round(v * 10) / 10, rank: i + 1,
  }));

  // ── Score patrimonial ──
  let score = 50;
  if (epargnePrec >= seuilPrec) score += 8; else if (epargnePrec >= seuilPrec * 0.5) score += 3; else score -= 8;
  score += { aucune: -10, faible: -3, moyenne: 5, bonne: 12 }[retraitePrep] ?? 0;
  const nbProd = detenus.filter(d => d !== "aucun").length;
  score += Math.min(10, nbProd * 2);
  const seuilPat = Math.max(1, age - 25) * 8000;
  const totalPat = patFin + patImmo;
  if (totalPat > seuilPat * 2) score += 12; else if (totalPat > seuilPat) score += 6; else if (totalPat < seuilPat * 0.3) score -= 6;
  if (rev > 0) {
    const taux = (capEpargne * 12) / rev;
    if (taux >= 0.15) score += 8; else if (taux >= 0.08) score += 4; else if (taux < 0.02) score -= 4;
  }
  score += { aucune: -6, employeur: 0, individuelle: 4, complet: 6 }[prevoyance] ?? 0;
  if (tauxEndettement > 0.35) score -= 8;
  if (tmi >= 30 && !detenus.includes("per")) score -= 4;
  score += { non: -2, en_cours: 2, oui: 5 }[resPrinc] ?? 0;
  score = Math.max(5, Math.min(100, score));

  const forces = [], faiblesses = [];
  if (epargnePrec >= seuilPrec) forces.push("Épargne de précaution suffisante"); else faiblesses.push("Épargne de précaution insuffisante");
  if (retraitePrep === "moyenne" || retraitePrep === "bonne") forces.push("Retraite déjà anticipée"); else faiblesses.push("Retraite peu ou pas préparée");
  if (nbProd >= 3) forces.push("Patrimoine financier diversifié"); else if (nbProd <= 1) faiblesses.push("Faible diversification");
  if (prevoyance === "individuelle" || prevoyance === "complet") forces.push("Prévoyance solide"); else if (prevoyance === "aucune") faiblesses.push("Absence de prévoyance");
  if (tmi >= 30 && detenus.includes("per")) forces.push("Levier fiscal PER activé");
  if (tauxEndettement > 0.35) faiblesses.push("Endettement élevé");

  const saving = computeTaxSavings(a);
  const planEpargne = computePlanAffectationEpargne(a);
  const demembrement = computeDemembrementReco(a);
  const capDemembre = computeCapiDemembreReco(a, planEpargne);
  const avLuxembourg = computeAvLuxembourgReco(a);
  const venteLocatif = computeVenteImmoLocatifReco(a);
  const ccaSci = computeCcaSciReco(a);

  const extras = [demembrement, capDemembre, avLuxembourg, venteLocatif, ccaSci].filter(Boolean);
  let recosTop = recosFinal.slice(0, 10);
  if (extras.length) recosTop = [...recosFinal.slice(0, 10 - extras.length), ...extras];

  const avDroitsEco = droitsAvEconomises(patFin, parseFloat(a.montant_av || 0), getEnfantsTotal(a), age);

  return {
    score: Math.round(score), priorites, recommandations: recosTop, forces, faiblesses,
    tax_savings: saving, capacite_emprunt: capaciteInfo, plan_affectation_epargne: planEpargne,
    demembrement, cap_demembre: capDemembre, av_luxembourg: avLuxembourg,
    av_droits_economises: avDroitsEco, fiscalite_calculee: a.fiscalite_calculee || {},
    ifi_calcule: ifiInfo, montant_ir_resolu: ir, tmi_resolu: tmi,
  };
}

// ── Teaser public (aucun nom de dispositif) ─────────────────────────────────

const DUREE_ENGAGEMENT_ANNEES = {
  malraux: 9, monuments_historiques: 15, deficit_foncier: 10, denormandie: 12,
  lmnp_ancien: 15, lmnp_para_hotelier: 15, lmnp_neuf: 15,
  immo_rendement_ancien: 15, immo_rendement_neuf: 15, scpi_nue_propriete: 15,
};
// Durée pendant laquelle le gain fiscal ANNUEL se répète réellement.
// Pour Malraux/MH, la réduction vient de l'étalement des travaux (6 ans /
// 4 ans) : au-delà, il n'y a plus de déduction sans nouveaux travaux. Pour
// Denormandie/Déficit foncier, la réduction dure bien tout l'engagement.
// Absent de cette table = on utilise la durée d'engagement complète.
const DUREE_GENERIQUE_PLACEMENT = 15;

const _LABEL_SOURCE_TO_ID = {
  "Investissement Denormandie": "denormandie", "Investissement Malraux": "malraux",
  "Monuments Historiques": "monuments_historiques", "Déficit foncier": "deficit_foncier",
};

function _dureeEtType(result, age) {
  const recos = result.recommandations || [];
  const horizonRetraite = Math.max(0, AGE_RETRAITE_PROJECTION - parseInt(age || 40));
  // recos est déjà trié par étoiles décroissantes : on cherche le premier
  // dispositif immobilier présent, même s'il n'est pas le tout premier de
  // la liste (ex : PER/Assurance-vie mieux notés en attendant que la base
  // de précaution soit sécurisée), pour rester cohérent avec l'économie
  // d'impôt qui, elle, compte déjà ce dispositif. On exclut cependant tout
  // dispositif dont l'engagement déborderait sur la retraite du client :
  // dans ce cas ce n'est plus une piste réaliste, on bascule sur la
  // logique "placement" (assurance-vie).
  const immoPresent = recos.find(r =>
    DUREE_ENGAGEMENT_ANNEES[r.id] !== undefined && DUREE_ENGAGEMENT_ANNEES[r.id] <= horizonRetraite
  );
  if (immoPresent) {
    return { duree_annees: DUREE_ENGAGEMENT_ANNEES[immoPresent.id], type: "immobilier", top_id: immoPresent.id };
  }
  return { duree_annees: DUREE_GENERIQUE_PLACEMENT, type: "placement", top_id: null };
}

function _economieAnnuelleCoherente(result, a) {
  const idsRecommandes = new Set((result.recommandations || []).map(r => r.id));
  const sources = (result.tax_savings || {}).sources || [];
  let total = 0;
  for (const src of sources) {
    const dispositifId = _LABEL_SOURCE_TO_ID[src.label];
    if (dispositifId !== undefined && !idsRecommandes.has(dispositifId)) continue;
    total += src.amount || 0;
  }
  // On ne peut jamais économiser plus que l'impôt réellement dû : les
  // différents leviers (PER + dispositif immobilier) sont chacun plafonnés
  // individuellement à l'IR dans le moteur d'origine, mais leur SOMME doit
  // elle aussi rester plafonnée à l'IR annuel réel du foyer.
  const irReel = parseFloat(a.montant_ir || 0);
  return round(Math.min(total, irReel > 0 ? irReel : total));
}

function _economieSuccessionDelta(result, a) {
  const enfants = Math.max(1, getEnfantsTotal(a));
  const abattementTotal = ABATTEMENT_DONATION_LIGNE_DIRECTE * enfants;

  // Si le client a explicitement indiqué s'il veut vendre ou non ses biens
  // locatifs, cette stratégie porte vraisemblablement sur les MÊMES biens
  // que le démembrement générique — on lui donne la priorité pour éviter
  // de compter deux fois (ou de masquer) le même patrimoine.
  if (a.pret_a_vendre_locatif === "oui") {
    const venteLocatif = (result.recommandations || []).find(r => r.id === "vente_immo_locatif_av");
    if (venteLocatif && venteLocatif.droits_economises > 0) return round(venteLocatif.droits_economises);
  }
  if (a.pret_a_vendre_locatif === "non") {
    const ccaSci = (result.recommandations || []).find(r => r.id === "cca_sci_locatif");
    if (ccaSci && ccaSci.droits_economises > 0) return round(ccaSci.droits_economises);
  }

  const demembrement = result.demembrement;
  if (demembrement) {
    const valeurPleine = demembrement.valeur_bien_indicative || 0;
    const valeurNp = demembrement.base_taxable_indicative || 0;
    const baseAvant = Math.max(0.0, valeurPleine - abattementTotal);
    const baseApres = Math.max(0.0, valeurNp - abattementTotal);
    const droitsAvant = _calculeDroitsSuccession(baseAvant / enfants) * enfants;
    const droitsApres = _calculeDroitsSuccession(baseApres / enfants) * enfants;
    return round(Math.max(0.0, droitsAvant - droitsApres));
  }

  const capDemembre = result.cap_demembre;
  if (capDemembre) {
    const montantExcedent = capDemembre.montant_excedent || 0;
    const abattementTotalDispo = capDemembre.abattement_total_disponible || 0;
    const baseAvant = Math.max(0.0, montantExcedent - abattementTotalDispo);
    const baseApres = capDemembre.base_taxable_apres_abattement || 0;
    const droitsAvant = _calculeDroitsSuccession(baseAvant);
    const droitsApres = _calculeDroitsSuccession(baseApres);
    return round(Math.max(0.0, droitsAvant - droitsApres));
  }

  // Vente immobilier locatif → AV : delta déjà chiffré directement par la fonction
  const venteLocatif = (result.recommandations || []).find(r => r.id === "vente_immo_locatif_av");
  if (venteLocatif && venteLocatif.droits_economises > 0) {
    return round(venteLocatif.droits_economises);
  }

  const ccaSci = (result.recommandations || []).find(r => r.id === "cca_sci_locatif");
  if (ccaSci && ccaSci.droits_economises > 0) {
    return round(ccaSci.droits_economises);
  }

  const avInfo = result.av_droits_economises;
  if (avInfo && avInfo.droits_economises > 0) {
    return round(avInfo.droits_economises);
  }

  return 0;
}

function _economieImmoAnnuelleCoherente(result, economieAnnuelleTotal) {
  const idsRecommandes = new Set((result.recommandations || []).map(r => r.id));
  const sources = (result.tax_savings || {}).sources || [];
  let totalImmo = 0;
  for (const src of sources) {
    if (src.label === "Versement PER") continue; // le PER n'est pas un dispositif immobilier
    const dispositifId = _LABEL_SOURCE_TO_ID[src.label];
    if (dispositifId !== undefined && !idsRecommandes.has(dispositifId)) continue;
    totalImmo += src.amount || 0;
  }
  // La part immobilière ne peut pas dépasser le total déjà plafonné à l'IR.
  return round(Math.min(totalImmo, economieAnnuelleTotal));
}

function _versementPerAnnuel(a) {
  const tmi = parseInt(a.tmi || 0);
  const rev = parseFloat(a.revenu_annuel || 0);
  const capEpargne = parseFloat(a.capacite_epargne || 0);
  if (tmi >= 30 && capEpargne >= 100) {
    return round(Math.min(rev * 0.10, Math.max(capEpargne * 12, 2000), 35000));
  }
  return 0;
}

const AGE_RETRAITE_PROJECTION = 64;
const TAUX_PLACEMENT_OPTIMISE = 0.05;   // hypothèse : allocation dynamique bien construite
const TAUX_PLACEMENT_PRUDENT = 0.02;    // hypothèse : fonds euros / livrets, référence de comparaison
const TAUX_RETRAIT_ANNUEL_RETRAITE = 0.03; // règle des 3 % / an, convertie en mensuel

function _valeurFutureVersementsMensuels(versementMensuel, tauxAnnuel, nbMois) {
  if (nbMois <= 0 || versementMensuel <= 0) return 0;
  const i = tauxAnnuel / 12.0;
  if (i <= 0) return versementMensuel * nbMois;
  return versementMensuel * ((Math.pow(1 + i, nbMois) - 1) / i);
}

function _valeurFutureCapitalUnique(capital, tauxAnnuel, nbMois) {
  if (nbMois <= 0 || capital <= 0) return capital;
  const i = tauxAnnuel / 12.0;
  return capital * Math.pow(1 + i, nbMois);
}

function _projectionAvOptimisee(a, planEpargne) {
  const age = parseInt(a.age || 40);
  const versementMensuel = parseFloat(a.capacite_epargne || 0);
  const nbMois = Math.max(0, (AGE_RETRAITE_PROJECTION - age) * 12);

  // Capital déjà disponible et réallocable : l'épargne au-delà du seuil de
  // précaution (comptes courants/livrets qui dorment) — à réinvestir en
  // une fois, en plus des versements mensuels réguliers à venir.
  const capitalReallocable = planEpargne ? parseFloat(planEpargne.surplus_a_affecter || 0) : 0;

  const capitalOptimise =
    _valeurFutureCapitalUnique(capitalReallocable, TAUX_PLACEMENT_OPTIMISE, nbMois) +
    _valeurFutureVersementsMensuels(versementMensuel, TAUX_PLACEMENT_OPTIMISE, nbMois);
  const capitalPrudent =
    _valeurFutureCapitalUnique(capitalReallocable, TAUX_PLACEMENT_PRUDENT, nbMois) +
    _valeurFutureVersementsMensuels(versementMensuel, TAUX_PLACEMENT_PRUDENT, nbMois);
  const gainAllocation = Math.max(0.0, capitalOptimise - capitalPrudent);
  const revenuMensuelRetraite = (capitalOptimise * TAUX_RETRAIT_ANNUEL_RETRAITE) / 12.0;

  return {
    nb_mois: nbMois, capital_reallocable: round(capitalReallocable),
    capital_optimise: round(capitalOptimise), capital_prudent: round(capitalPrudent),
    gain_allocation: round(gainAllocation), revenu_mensuel_retraite: round(revenuMensuelRetraite),
  };
}

function _montantProjetEtLoyer(a, result, dureeInfo) {
  if (dureeInfo.type !== "immobilier") return { montant_projet: 0, loyer_mensuel: 0, participation_mensuelle: 0 };
  const topId = dureeInfo.top_id;
  const capaciteInfo = result.capacite_emprunt;
  const projet = (topId === "malraux" || topId === "monuments_historiques")
    ? computeProjetMalrauxMh(a, capaciteInfo, topId)
    : computeProjetImmo(a, capaciteInfo, topId || "lmnp_ancien");
  return {
    montant_projet: projet.montant_projet || 0,
    loyer_mensuel: projet.loyer_estime_mensuel || 0,
    participation_mensuelle: projet.participation_mensuelle || 0,
  };
}

function buildTeaserSimulateur(a) {
  const aResolue = resolveFiscalite(a);
  const result = computeRecommendations(a);
  const age = parseInt(aResolue.age || 40);

  const dureeInfo = _dureeEtType(result, age);
  const dureeAnnees = dureeInfo.duree_annees;

  // 1) Économie d'impôt réelle. La part immobilière (Malraux/MH) ne peut se
  //    répéter que sur sa durée d'étalement fiscal réel (6 ans / 4 ans) —
  //    au-delà, plus de déduction sans nouveaux travaux. Le reste (PER,
  //    Denormandie, Déficit foncier) est supposé se répéter sur la durée
  //    d'engagement complète. Le tout reste plafonné à l'IR annuel réel.
  const economieAnnuelle = _economieAnnuelleCoherente(result, aResolue);
  const economieImmoAnnuelle = _economieImmoAnnuelleCoherente(result, economieAnnuelle);
  const economieAutreAnnuelle = economieAnnuelle - economieImmoAnnuelle;
  const horizonRetraite = Math.max(0, AGE_RETRAITE_PROJECTION - age);
  const techImmo = dureeInfo.top_id ? DUREE_DISPOSITIF_FISCAL[dureeInfo.top_id] : undefined;
  // La réduction d'impôt ne peut pas s'appliquer plus longtemps que
  // l'étalement fiscal réel du dispositif, ni au-delà du départ à la
  // retraite du client (au-delà, plus de revenus professionnels à défiscaliser).
  const dureeEtalementImmo = techImmo
    ? Math.min(dureeAnnees, techImmo.etalement, horizonRetraite)
    : Math.min(dureeAnnees, horizonRetraite);
  const economieImpotsCumulee = round(economieImmoAnnuelle * dureeEtalementImmo + economieAutreAnnuelle * Math.min(dureeAnnees, horizonRetraite));

  // 2) Patrimoine en plus (immobilier), net de la part immo déjà comptée en économie d'impôt
  const { montant_projet: montantProjet, loyer_mensuel: loyerMensuel, participation_mensuelle: participationMensuelle } = _montantProjetEtLoyer(aResolue, result, dureeInfo);
  const patrimoineEnPlus = dureeInfo.type === "immobilier"
    ? round(Math.max(0, montantProjet - economieImmoAnnuelle * dureeEtalementImmo))
    : 0;

  // 3) Droits de succession en moins (delta avant/après optimisation)
  const economieSuccession = _economieSuccessionDelta(result, a);

  // 4) Pas d'immobilier retenu : optimisation d'un placement (assurance-vie)
  //    — gain d'une allocation dynamique (5 %/an) vs un placement prudent
  //    (2 %/an), à versements mensuels constants jusqu'à 64 ans.
  const avProjection = dureeInfo.type === "placement" ? _projectionAvOptimisee(aResolue, result.plan_affectation_epargne) : null;
  const gainAllocation = avProjection ? avProjection.gain_allocation : 0;

  // 4bis) Biens locatifs multiples restructurés (apport en compte courant
  //       d'associé) : revenu régulier non fiscalisé sur 20 ans, si le
  //       client ne souhaite pas vendre.
  const ccaSciReco = (result.recommandations || []).find(r => r.id === "cca_sci_locatif");
  const revenuCcaCumule = ccaSciReco ? ccaSciReco.remboursement_cumule : 0;
  const revenuCcaMensuel = ccaSciReco ? ccaSciReco.revenu_mensuel_non_fiscalise : 0;

  const totalPotentiel = economieImpotsCumulee + patrimoineEnPlus + economieSuccession + gainAllocation + revenuCcaCumule;

  // 5) Confort mensuel : capital PER lissé sur 240 mois (20 ans) + loyer net
  //    de la solution immobilière + revenu complémentaire de retraite estimé
  //    à partir de 64 ans (3 %/an du capital constitué, divisé par 12) +
  //    revenu non fiscalisé issu de la restructuration des biens locatifs.
  const versementPerAnnuel = _versementPerAnnuel(aResolue);
  const capitalPerLisseMensuel = round((versementPerAnnuel * 20) / 240);
  const revenuRetraiteMensuel = avProjection ? avProjection.revenu_mensuel_retraite : 0;
  const confortMensuel = round(capitalPerLisseMensuel + loyerMensuel + revenuRetraiteMensuel + revenuCcaMensuel);

  const fmt = (n) => n.toLocaleString("fr-FR").replace(/\u202f|\u00a0/g, " ");

  const lignes = [
    { label: "Économie d'impôts accessible dans votre situation", montant: economieImpotsCumulee },
  ];
  if (patrimoineEnPlus > 0) lignes.push({ label: "Patrimoine en plus (déduction faite de la réduction d'impôts)", montant: patrimoineEnPlus });
  if (gainAllocation > 0) lignes.push({ label: "Gain grâce à une allocation optimisée (vs. placement prudent)", montant: gainAllocation });
  if (revenuCcaCumule > 0) lignes.push({ label: "Revenus complémentaires libérés sans fiscalité supplémentaire (sur 20 ans)", montant: revenuCcaCumule });
  if (economieSuccession > 0) lignes.push({ label: "Droits de succession en moins", montant: economieSuccession });

  const message = `Sur la base des informations saisies, un potentiel total de l'ordre de ${fmt(totalPotentiel)} € a été identifié sur ${dureeAnnees} ans, tous leviers cumulés.`;

  return {
    duree_annees: dureeAnnees,
    economie_impots_cumulee: economieImpotsCumulee,
    patrimoine_en_plus: patrimoineEnPlus,
    gain_allocation: gainAllocation,
    economie_succession: economieSuccession,
    total_potentiel: round(totalPotentiel),
    confort_mensuel: confortMensuel,
    revenu_retraite_mensuel: revenuRetraiteMensuel,
    revenu_cca_cumule: revenuCcaCumule,
    revenu_cca_mensuel: revenuCcaMensuel,
    participation_mensuelle: participationMensuelle,
    lignes,
    message,
    mention_legale: "Ces estimations sont fournies à titre indicatif sur la base des informations saisies et ne constituent pas une garantie de résultat. Le confort mensuel indiqué (capital retraite, loyers, revenu complémentaire) est une projection lissée qui ne prend pas en compte la performance financière future réelle des supports. Un rendez-vous avec un conseiller est nécessaire pour affiner ces montants.",
  };
}

function recomputeVisible(){
  visibleSteps = STEPS.filter(s => !s.condition || s.condition(answers));

function el(tag, cls, html){ const e=document.createElement(tag); if(cls) e.className=cls; if(html!==undefined) e.innerHTML=html; return e; }

function render(){
  recomputeVisible();
  if(current >= visibleSteps.length) current = visibleSteps.length - 1;
  const step = visibleSteps[current];
  const app = document.getElementById("app");
  app.innerHTML = "";

  if(step.id === "intro"){
    app.appendChild(renderIntro());
    return;
  }
  if(step.id === "result"){
    app.appendChild(renderResultCard());
    return;
  }

  const progressPct = Math.round((current / (visibleSteps.length-1)) * 100);
  const progress = el("div","progress"); progress.appendChild(el("div","progress-bar")); progress.firstChild.style.width = progressPct+"%";
  app.appendChild(progress);

  const card = el("div","card");
  card.appendChild(el("label","field-label", step.label));
  if(step.sub) card.appendChild(el("div","field-sub", step.sub));

  if(step.type === "number"){
    const input = document.createElement("input");
    input.type = "number"; input.min = step.min; input.max = step.max; input.step = step.step||1;
    if(answers[step.id]===undefined) {
      answers[step.id] = typeof step.default === "function" ? step.default(answers) : step.default;
    }
    input.value = answers[step.id] !== undefined && answers[step.id] !== null ? answers[step.id] : "";
    input.placeholder = step.unit || "";
    input.oninput = ()=>{ answers[step.id] = input.value === "" ? null : Number(input.value); };
    card.appendChild(input);
  } else if(step.type === "single"){
    const box = el("div","opts");
    step.options.forEach(([val,label])=>{
      const o = el("div","opt", label);
      if(answers[step.id]===val) o.classList.add("sel");
      o.onclick = ()=>{ answers[step.id]=val; render(); };
      box.appendChild(o);
    });
    card.appendChild(box);
  } else if(step.type === "multi"){
    if(!answers[step.id]) answers[step.id] = [];
    const box = el("div","opts");
    step.options.forEach(([val,label])=>{
      const o = el("div","opt multi", label);
      if(answers[step.id].includes(val)) o.classList.add("sel");
      o.onclick = ()=>{
        const arr = answers[step.id];
        const idx = arr.indexOf(val);
        if(idx>=0){ arr.splice(idx,1); }
        else { if(step.max && arr.length>=step.max) arr.shift(); arr.push(val); }
        render();
      };
      box.appendChild(o);
    });
    card.appendChild(box);
  }

  app.appendChild(card);

  const nav = el("div","nav");
  if(current>0){
    const back = el("button","btn-secondary","← Retour");
    back.onclick = ()=>{ current--; render(); };
    nav.appendChild(back);
  } else {
    nav.appendChild(el("div"));
  }
  const next = el("button","btn-primary", current===visibleSteps.length-2 ? "Voir mon estimation →" : "Suivant →");
  next.onclick = ()=>{ current++; render(); };
  nav.appendChild(next);
  app.appendChild(nav);
}

function formatReponseHumaine(step, val){
  if(val === null || val === undefined || val === "") return "(non renseigné)";
  if(step.type === "number"){
    return val + (step.unit ? " " + step.unit : "");
  }
  if(step.type === "single"){
    const found = step.options.find(([v])=>v===val);
    return found ? found[1] : val;
  }
  if(step.type === "multi"){
    if(!Array.isArray(val) || val.length===0) return "(aucun)";
    return val.map(v=>{
      const found = step.options.find(([vv])=>vv===v);
      return found ? found[1] : v;
    }).join(", ");
  }
  return String(val);
}

function buildRecapTexte(data){
  const lignesTxt = data.lignes.map(l => "• " + l.label + " : " + l.montant.toLocaleString("fr-FR").replace(/\u202f|\u00a0/g," ") + " €").join("\n");
  const totalTxt = "TOTAL POTENTIEL ESTIMÉ : " + data.total_potentiel.toLocaleString("fr-FR").replace(/\u202f|\u00a0/g," ") + " € (sur " + data.duree_annees + " ans)";
  const confortTxt = data.confort_mensuel > 0
    ? "\nRevenus complémentaires à la retraite estimés : " + data.confort_mensuel.toLocaleString("fr-FR").replace(/\u202f|\u00a0/g," ") + " €/mois (capital retraite lissé + loyers potentiels)"
    : "";

  const reponsesTxt = visibleSteps
    .filter(s => s.id!=="intro" && s.id!=="result")
    .map(s => "- " + s.label.replace(/\s*\?$/,"") + " : " + formatReponseHumaine(s, answers[s.id]))
    .join("\n");

  return { lignesTxt, totalTxt, confortTxt, reponsesTxt };
}

function buildInternalRecapText(answers, data){
  const result = computeRecommendations(answers);
  const L = [];
  const line = (t) => L.push(t);
  const title = (t) => { L.push(""); L.push("== " + t + " =="); };

  title("Coordonnées du prospect");
  line("Nom : " + (answers.__contact_name || ""));
  line("Email : " + (answers.__contact_email || ""));
  line("Téléphone : " + (answers.__contact_phone || ""));

  title("Réponses au questionnaire");
  visibleSteps.filter(s=>s.id!=="intro"&&s.id!=="result").forEach(s=>{
    line("- " + s.label.replace(/\s*\?$/,"") + " : " + formatReponseHumaine(s, answers[s.id]));
  });

  title("Score et priorités détectées");
  line("Score patrimonial : " + result.score + "/100");
  line("Priorités (ordre) : " + result.priorites.map(p=>p.label+" ("+p.intensity+"/10)").join(" · "));

  title("Solutions retenues par le moteur (noms réels)");
  result.recommandations.forEach(r=>{
    line("- " + r.label + " — " + r.stars + "/5 étoiles" + (r.etape_suivante ? " (à horizon, base de précaution pas encore sécurisée)" : ""));
  });

  if(data.patrimoine_en_plus > 0 || data.economie_impots_cumulee > 0){
    const topImmo = result.recommandations.find(r => r.projet && r.projet.montant_projet > 0);
    title("Détail du calcul — volet immobilier");
    if(topImmo && topImmo.projet){
      const p = topImmo.projet;
      line("Dispositif : " + topImmo.label);
      line("Montant du projet : " + p.montant_projet + " € (emprunté : " + (p.montant_emprunte||0) + " €)");
      line("Mensualité de crédit estimée : " + p.mensualite_credit + " €/mois");
      line("Loyer estimé : " + p.loyer_estime_mensuel + " €/mois");
      if(p.participation_mensuelle !== undefined) line("Participation nette mensuelle (mensualité - loyer - économie fiscale lissée) : " + p.participation_mensuelle + " €/mois");
      if(p.economie_fiscale_annuelle !== undefined) line("Économie fiscale annuelle (dispositif) : " + p.economie_fiscale_annuelle + " €/an");
    }
    line("Économie d'impôts cumulée retenue (teaser) : " + data.economie_impots_cumulee + " €");
    line("Patrimoine en plus retenu (teaser) : " + data.patrimoine_en_plus + " €");
  }

  if(data.gain_allocation > 0){
    title("Détail du calcul — volet placement (assurance-vie)");
    line("Versement mensuel pris en compte : " + (answers.capacite_epargne||0) + " €/mois");
    line("Hypothèse allocation optimisée : 5 %/an — Hypothèse placement prudent : 2 %/an");
    line("Gain lié à l'allocation (delta 5% vs 2%) : " + data.gain_allocation + " €");
    line("Revenus complémentaires retraite estimés (dès 64 ans, 3 %/an du capital / 12) : " + data.revenu_retraite_mensuel + " €/mois");
  }

  if(data.economie_succession > 0){
    title("Détail du calcul — volet succession");
    if(result.demembrement) line("Démembrement — valeur du bien : " + result.demembrement.valeur_bien_indicative + " € / valeur nue-propriété retenue : " + result.demembrement.base_taxable_indicative + " €");
    if(result.cap_demembre) line("Capitalisation démembrée — montant excédent : " + result.cap_demembre.montant_excedent + " € / base taxable après abattement : " + result.cap_demembre.base_taxable_apres_abattement + " €");
    if(result.av_droits_economises) line("Optimisation assurance-vie — potentiel restant : " + result.av_droits_economises.potentiel_restant + " €");
    line("Droits de succession économisés (delta avant/après) : " + data.economie_succession + " €");
  }

  title("Total potentiel présenté au prospect");
  line("Sur " + data.duree_annees + " ans : " + data.total_potentiel + " € cumulés");
  line("Revenus complémentaires présentés : " + data.confort_mensuel + " €/mois");

  return L.join("\n");
}

    left.style.margin = "0";
    monthly.appendChild(left);
    const val = el("div","", data.confort_mensuel.toLocaleString("fr-FR").replace(/\u202f|\u00a0/g," ") + " €/mois");
    val.style.fontWeight="700"; val.style.whiteSpace="nowrap"; val.style.color="var(--gold)"; val.style.fontSize="18px";
    monthly.appendChild(val);
    card.appendChild(monthly);
  }

  card.appendChild(el("div","result-msg", data.message));

  const cta = el("div","card");
  cta.style.padding = "20px";
  cta.appendChild(el("label","field-label","Recevoir le détail personnalisé"));
  cta.appendChild(el("div","field-sub","Un conseiller vous contacte gratuitement pour affiner cette estimation et vous présenter les solutions concrètes adaptées à votre situation."));

  const name = document.createElement("input"); name.type="text"; name.placeholder="Nom et prénom";
  const email = document.createElement("input"); email.type="email"; email.placeholder="Email";
  const phone = document.createElement("input"); phone.type="tel"; phone.placeholder="Téléphone";
  [name,email,phone].forEach(i=>cta.appendChild(i));

  const errBox = el("div","err","");
  const send = el("button","btn-primary","Être recontacté(e) →");
  send.style.width="100%"; send.style.marginTop="8px";
  send.onclick = ()=>{
    errBox.textContent = "";
    if(!name.value || !email.value || !phone.value){
      errBox.textContent = "Merci de renseigner votre nom, email et téléphone.";
      cta.appendChild(errBox);
      return;
    }

    const { lignesTxt, totalTxt, confortTxt, reponsesTxt } = buildRecapTexte(data);

    const sujet = encodeURIComponent("Demande de rendez-vous — estimation patrimoniale de " + name.value);
    const corps =
"Bonjour,\n\n" +
"J'ai réalisé mon estimation patrimoniale en ligne et voici le résultat obtenu. J'aimerais en savoir plus, s'il vous plaît.\n" +
"Merci d'avance de me recontacter dès que possible.\n\n" +
"Mes coordonnées :\n" +
"Nom : " + name.value + "\n" +
"Email : " + email.value + "\n" +
"Téléphone : " + phone.value + "\n\n" +
"— Résultat de l'estimation —\n" +
lignesTxt + "\n" +
totalTxt + confortTxt + "\n\n" +
"— Détail de mes réponses au questionnaire —\n" +
reponsesTxt + "\n\n" +
"Bien cordialement,\n" +
name.value;

    window.location.href = "mailto:" + EMAIL_CGP + "?subject=" + sujet + "&body=" + encodeURIComponent(corps);

    envoyerRecapInterneSilencieux(answers, data, { name: name.value, email: email.value, phone: phone.value });

    cta.innerHTML = "";
    cta.appendChild(el("div","field-label","Merci ! ✓"));
    cta.appendChild(el("div","field-sub","Votre logiciel de messagerie va s'ouvrir avec votre demande pré-remplie. Il ne vous reste qu'à cliquer sur \"Envoyer\"."));
    const copyNote = el("div","field-sub","Si votre messagerie ne s'ouvre pas automatiquement, vous pouvez copier le récapitulatif ci-dessous et l'envoyer manuellement à " + EMAIL_CGP + " :");
    copyNote.style.marginTop = "14px";
    cta.appendChild(copyNote);
    const recapBox = document.createElement("textarea");
    recapBox.readOnly = true;
    recapBox.value = corps;
    recapBox.style.width="100%"; recapBox.style.height="140px"; recapBox.style.fontFamily="inherit";
    recapBox.style.fontSize="13px"; recapBox.style.padding="10px"; recapBox.style.border="1px solid var(--line)";
    recapBox.style.borderRadius="9px"; recapBox.style.background="#fdfcf9"; recapBox.style.color="var(--ink)";
    cta.appendChild(recapBox);
  };
  cta.appendChild(send);
  card.appendChild(cta);

  card.appendChild(el("div","mention", data.mention_legale));
}

render();
</script>
</body>
</html>
